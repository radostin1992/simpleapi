spring.application.name=simpleapi
spring.devtools.restart.enabled=true
springdoc.api-docs.path=/api-docs

# Credentials
simpleapi.credentials.appapi.username=${APPAPI_USERNAME}
simpleapi.credentials.appapi.password=${APPAPI_PASSWORD}
simpleapi.credentials.internal.username=${INTERNAL_USERNAME}
simpleapi.credentials.internal.password=${INTERNAL_PASSWORD}
simpleapi.credentials.swagger.username=${SWAGGER_USERNAME}
simpleapi.credentials.swagger.password=${SWAGGER_PASSWORD}

#--- Default profile
spring.config.activate.on-profile=default
# PostgreSQL Configuration
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway config
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

#--- TESTS profile
spring.config.activate.on-profile=tests
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=sa